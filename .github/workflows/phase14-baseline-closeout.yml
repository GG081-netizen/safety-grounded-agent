name: Phase 14-G Baseline Closeout

on:
  workflow_dispatch:
    inputs:
      candidate_manifest_sha256:
        required: true
        type: string
      expected_root_commit_sha:
        required: true
        type: string
      expected_root_tree_sha:
        required: true
        type: string
      discovery_workflow_id:
        required: true
        type: string
      discovery_workflow_path:
        required: true
        type: string
      discovery_run_id:
        required: true
        type: string
      discovery_run_attempt:
        required: true
        type: string
      discovery_artifact_id:
        required: true
        type: string
      discovery_artifact_name:
        required: true
        type: string
      discovery_artifact_digest:
        required: true
        type: string

permissions:
  contents: read

env:
  PHASE14_BASELINE_ENVIRONMENT: phase14-baseline-closeout

jobs:
  test:
    name: test
    if: github.server_url == 'https://github.com' && github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install frozen dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Verify root and Candidate Manifest
        run: |
          test "$GITHUB_SHA" = "${{ inputs.expected_root_commit_sha }}"
          test "$(git show -s --format=%T HEAD)" = "${{ inputs.expected_root_tree_sha }}"
          uv run --frozen --extra dev python scripts/create_phase14_candidate_manifest.py --mode index --root . --output tmp/phase14-candidate-manifest.json --expect-sha256 "${{ inputs.candidate_manifest_sha256 }}"
      - name: Run regression gates
        run: |
          uv run --frozen --extra dev python -m compileall -q src tests scripts
          uv run --frozen --extra dev python scripts/check_nodeid_baseline.py
          uv run --frozen --extra dev python -m pytest -m unit -q
          uv run --frozen --extra dev python -m pytest -q
          uv run --frozen --extra dev convagent eval policy-boundary --strict
          uv run --frozen --extra dev convagent eval rag-adapter --strict
          uv run --frozen --extra dev convagent eval production-blockers --scope implementation --strict
          uv run --frozen --extra dev python -m build
          uv run --frozen --extra dev python scripts/check_distribution_contents.py
      - name: Bind producer runtime identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py --mode producer --job-name test --output tmp/test-baseline-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-test-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/test-baseline-evidence.json
          if-no-files-found: error
          retention-days: 90

  secret-scan:
    name: secret-scan
    if: github.server_url == 'https://github.com' && github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Install pinned Gitleaks
        run: |
          curl --fail --location --silent --show-error --output gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file gitleaks.tar.gz gitleaks
          test "$(./gitleaks version)" = "8.30.1"
      - name: Scan source and all refs
        run: |
          uv run --frozen --extra dev python scripts/check_repository_hygiene.py --scope source-tree
          uv run --frozen --extra dev python scripts/run_gitleaks_functional_gate.py --binary ./gitleaks --repository . --config .gitleaks.toml --summary tmp/gitleaks.json --subject-commit-sha "$GITHUB_SHA" --checksum-valid --version-valid
      - name: Bind producer runtime identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py --mode producer --job-name secret-scan --output tmp/secret-baseline-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-secret-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/secret-baseline-evidence.json
          if-no-files-found: error
          retention-days: 90

  postgres-integration:
    name: postgres-integration
    if: github.server_url == 'https://github.com' && github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      POSTGRES_USER: convagent_test
      POSTGRES_PASSWORD: convagent_ci_test_only
      POSTGRES_DB: convagent_baseline_test
      CONVAGENT_POSTGRES_TEST_URL: postgresql+asyncpg://convagent_test:convagent_ci_test_only@127.0.0.1:5432/convagent_baseline_test
      CONVAGENT_TEST_DB_CONFIRMED: convagent_baseline_test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: convagent_test
          POSTGRES_PASSWORD: convagent_ci_test_only
          POSTGRES_DB: convagent_baseline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convagent_test -d convagent_baseline_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: |
          uv lock --check
          uv sync --frozen --extra dev
          uv run --frozen --extra dev alembic -x database_url="$CONVAGENT_POSTGRES_TEST_URL" upgrade head
      - name: Run PostgreSQL contracts
        env:
          CONVAGENT_ALLOW_DESTRUCTIVE_DB_TESTS: "true"
        run: uv run --frozen --extra dev python -m pytest -p no:xdist -m "postgres_integration and not operational_integration" -q
      - name: Verify revision
        run: uv run --frozen --extra dev alembic -x database_url="$CONVAGENT_POSTGRES_TEST_URL" current | grep -Fx "0001 (head)"
      - name: Bind producer runtime identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py --mode producer --job-name postgres-integration --output tmp/postgres-baseline-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-postgres-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/postgres-baseline-evidence.json
          if-no-files-found: error
          retention-days: 90

  operational-postgres:
    name: operational-postgres
    if: github.server_url == 'https://github.com' && github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      POSTGRES_USER: convagent_test
      POSTGRES_PASSWORD: convagent_ci_test_only
      POSTGRES_DB: convagent_operational_test
      CONVAGENT_POSTGRES_TEST_URL: postgresql+asyncpg://convagent_test:convagent_ci_test_only@127.0.0.1:5432/convagent_operational_test
      CONVAGENT_TEST_DB_CONFIRMED: convagent_operational_test
      CONVAGENT_ALLOW_DESTRUCTIVE_DB_TESTS: "true"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: convagent_test
          POSTGRES_PASSWORD: convagent_ci_test_only
          POSTGRES_DB: convagent_operational_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convagent_test -d convagent_operational_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: |
          uv lock --check
          uv sync --frozen --extra dev
          uv run --frozen --extra dev alembic -x database_url="$CONVAGENT_POSTGRES_TEST_URL" upgrade head
          uv run --frozen --extra dev python -m pytest -p no:xdist -m operational_integration -q
      - name: Bind producer runtime identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py --mode producer --job-name operational-postgres --output tmp/operational-baseline-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-operational-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/operational-baseline-evidence.json
          if-no-files-found: error
          retention-days: 90

  baseline-approval:
    name: baseline-approval
    needs: [test, secret-scan, postgres-integration, operational-postgres]
    if: github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    environment: phase14-baseline-closeout
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Verify predecessors, protected approval, and runtime identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py --mode approval --output tmp/baseline-approval-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-approval-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/baseline-approval-evidence.json
          if-no-files-found: error
          retention-days: 90

  baseline-closeout:
    name: baseline-closeout
    needs: [test, secret-scan, postgres-integration, operational-postgres, baseline-approval]
    if: github.event_name == 'workflow_dispatch' && github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: |
          uv lock --check
          uv sync --frozen --extra dev
      - uses: actions/download-artifact@v4
        with:
          name: phase14-baseline-approval-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/approval
      - name: Rebuild Candidate Manifest
        run: uv run --frozen --extra dev python scripts/create_phase14_candidate_manifest.py --mode index --root . --output tmp/phase14-candidate-manifest.json --expect-sha256 "${{ inputs.candidate_manifest_sha256 }}"
      - name: Reconstruct and verify external Discovery binding
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          uv run --frozen --extra dev python scripts/verify_phase14_repository_baseline.py
          --mode discovery-binding
          --artifact-id "${{ inputs.discovery_artifact_id }}"
          --artifact-name "${{ inputs.discovery_artifact_name }}"
          --expected-artifact-digest "${{ inputs.discovery_artifact_digest }}"
          --expected-workflow-id "${{ inputs.discovery_workflow_id }}"
          --workflow-run-id "${{ inputs.discovery_run_id }}"
          --subject-commit-sha "${{ inputs.expected_root_commit_sha }}"
          --expected-tree-sha "${{ inputs.expected_root_tree_sha }}"
          --candidate-manifest-sha256 "${{ inputs.candidate_manifest_sha256 }}"
          --output tmp/discovery-binding.json
      - name: Create non-self-authoritative baseline artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PHASE14_CURRENT_CHECK_RUN_ID: ${{ job.check_run_id }}
        run: >-
          uv run --frozen --extra dev python scripts/create_phase14_baseline_evidence.py
          --mode closeout --candidate-manifest tmp/phase14-candidate-manifest.json
          --discovery-binding tmp/discovery-binding.json
          --approval-evidence tmp/approval/baseline-approval-evidence.json
          --discovery-workflow-id "${{ inputs.discovery_workflow_id }}"
          --discovery-workflow-path "${{ inputs.discovery_workflow_path }}"
          --discovery-run-id "${{ inputs.discovery_run_id }}"
          --discovery-run-attempt "${{ inputs.discovery_run_attempt }}"
          --output tmp/phase14-baseline-artifact
      - name: Verify staging content offline
        run: uv run --frozen --extra dev python scripts/verify_phase14_repository_baseline.py --mode offline --artifact-dir tmp/phase14-baseline-artifact --output tmp/offline-verification.json
      - name: Upload baseline artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase14-baseline-closeout-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          path: tmp/phase14-baseline-artifact/
          include-hidden-files: false
          if-no-files-found: error
          retention-days: 90
      - name: Publish candidate-only summary
        run: |
          echo "Phase 14-G candidate artifact uploaded." >> "$GITHUB_STEP_SUMMARY"
          echo "Authoritative repository baseline requires the independent online verifier." >> "$GITHUB_STEP_SUMMARY"
          echo "Phase 14 overall remains BLOCKED." >> "$GITHUB_STEP_SUMMARY"
