---
# yamllint disable rule:line-length
name: Portfolio CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-contract:
    name: unit-and-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install frozen development dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Compile source, tests, and scripts
        run: uv run --frozen --extra dev python -m compileall -q src tests scripts
      - name: Verify test Node ID baselines
        run: uv run --frozen --extra dev python scripts/check_nodeid_baseline.py
      - name: Run unit suite
        run: uv run --frozen --extra dev python -m pytest -m unit -q --durations=20
      - name: Run non-PostgreSQL full suite
        run: uv run --frozen --extra dev python -m pytest -m "not postgres_integration and not operational_integration" -q

  policy-and-rag-evaluation:
    name: policy-and-rag-evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install frozen development dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Evaluate policy boundary
        run: uv run --frozen --extra dev convagent eval policy-boundary --strict
      - name: Evaluate RAG adapter
        run: uv run --frozen --extra dev convagent eval rag-adapter --strict
      - name: Evaluate implementation production blockers
        run: uv run --frozen --extra dev convagent eval production-blockers --scope implementation --strict

  secret-and-source-tree:
    name: secret-and-source-tree
    runs-on: ubuntu-latest
    env:
      GITLEAKS_DIR: ${{ runner.temp }}/phase15-gitleaks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install frozen development dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Scan source tree before scanner installation
        run: |
          mkdir -p "$GITLEAKS_DIR"
          uv run --frozen --extra dev python scripts/check_repository_hygiene.py --scope source-tree --json > "$GITLEAKS_DIR/source-tree-before.json"
          uv run --frozen --extra dev python scripts/check_repository_hygiene.py --scope tracked-files --json > "$GITLEAKS_DIR/tracked-files.json"
      - name: Install pinned Gitleaks outside the repository
        shell: bash
        run: |
          archive="$GITLEAKS_DIR/gitleaks.tar.gz"
          binary="$GITLEAKS_DIR/gitleaks"
          curl --fail --location --silent --show-error --output "$archive" https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          test "$(sha256sum "$archive" | cut -d ' ' -f1)" = "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          tar --extract --gzip --file "$archive" --directory "$GITLEAKS_DIR" gitleaks
          test "$("$binary" version)" = "8.30.1"
      - name: Run dual Canary gate and scan all refs
        run: >-
          uv run --frozen --extra dev python scripts/run_gitleaks_functional_gate.py
          --binary "$GITLEAKS_DIR/gitleaks"
          --repository .
          --config .gitleaks.toml
          --summary "$GITLEAKS_DIR/gitleaks-summary.json"
          --temporary-directory "$GITLEAKS_DIR"
          --subject-commit-sha "$GITHUB_SHA"
          --checksum-valid
          --version-valid
      - name: Prove scanner installation did not change the source tree
        run: |
          uv run --frozen --extra dev python scripts/check_repository_hygiene.py --scope source-tree --json > "$GITLEAKS_DIR/source-tree-after.json"
          cmp "$GITLEAKS_DIR/source-tree-before.json" "$GITLEAKS_DIR/source-tree-after.json"
          test -z "$(git status --short --untracked-files=all)"

  package-build:
    name: package-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install frozen development dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Build and inspect distributions
        run: |
          uv run --frozen --extra dev python -m build
          uv run --frozen --extra dev python scripts/check_distribution_contents.py --output-json "$RUNNER_TEMP/distribution.json"

  postgres-integration:
    name: postgres-integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: convagent_test
      POSTGRES_PASSWORD: convagent_ci_test_only
      POSTGRES_DB: convagent_portfolio_test
      CONVAGENT_POSTGRES_TEST_URL: postgresql+asyncpg://convagent_test:convagent_ci_test_only@127.0.0.1:5432/convagent_portfolio_test
      CONVAGENT_TEST_DB_CONFIRMED: convagent_portfolio_test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: convagent_test
          POSTGRES_PASSWORD: convagent_ci_test_only
          POSTGRES_DB: convagent_portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convagent_test -d convagent_portfolio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install frozen development dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev
      - name: Upgrade database to head
        run: uv run --frozen --extra dev alembic -x database_url="$CONVAGENT_POSTGRES_TEST_URL" upgrade head
      - name: Run non-destructive PostgreSQL contracts
        env:
          CONVAGENT_ALLOW_DESTRUCTIVE_DB_TESTS: "false"
        run: uv run --frozen --extra dev python -m pytest -p no:xdist -m "postgres_integration and not operational_integration" -v --junitxml="$RUNNER_TEMP/postgres-nondestructive.xml"
      - name: Verify suite identity, required tests, and allowed skips
        run: >-
          uv run --frozen --extra dev python scripts/check_pytest_junit.py
          "$RUNNER_TEMP/postgres-nondestructive.xml"
          --suite-identity postgres-non-destructive
          --minimum-tests 74
          --allowed-skip test_downgrade_removes_four_business_tables
          --allowed-skip test_upgrade_downgrade_upgrade_cycle
          --output-json "$RUNNER_TEMP/postgres-nondestructive-validation.json"
          --required-test test_repository_commit_makes_request_and_audit_visible
          --required-test test_transaction_a_visible_while_coordinator_is_blocked
          --required-test test_alembic_does_not_disable_application_loggers
          --required-test test_service_level_concurrent_duplicate_executes_once_then_replays
          --required-test test_service_completed_replay_and_canonical_multiple_replay
          --required-test test_policy_blocked_finalizes_atomically_and_replays
          --required-test test_expired_active_reclaim_creates_failed_management_run
          --required-test test_stale_claim_token_cannot_complete_or_fail_fenced
          --required-test test_oversized_replay_snapshot_rolls_back_real_finalization
          --required-test test_http_postgres_executes_and_replays
          --required-test test_http_postgres_in_progress_then_replays
          --required-test test_http_postgres_policy_blocked_is_replayed
          --required-test test_http_postgres_previous_failure_is_409
          --required-test test_http_postgres_projection_failure_then_replay
          --required-test test_integrity_checker_and_doctor_are_read_only_on_real_postgres
          --required-test test_prune_uses_database_time_and_never_deletes_active_or_history
      - name: Verify final migration revision
        run: |
          uv run --frozen --extra dev alembic -x database_url="$CONVAGENT_POSTGRES_TEST_URL" current > "$RUNNER_TEMP/alembic-current.txt"
          grep -Fx "0001 (head)" "$RUNNER_TEMP/alembic-current.txt"
