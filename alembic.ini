# Alembic configuration for conversation_agent (M1.4-B).
#
# sqlalchemy.url is intentionally EMPTY — env.py resolves the URL from:
#   1. -x database_url=<url>  (CLI option — highest priority)
#   2. CONVAGENT_DATABASE_URL  (environment variable)
#   3. Fails with clear error if neither is available
#
# Migrations are explicit-only:
#   uv run alembic -x database_url=<url> upgrade head
#   uv run alembic -x database_url=<url> downgrade base
#
# Auto-migration at startup is NEVER performed.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
